server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: agentflow-hub
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.agentflow: DEBUG
    org.springframework.web: INFO

agentflow:
  api:
    prefix: /api/v1
